# ─── Font ───────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
font_features    JetBrainsMonoNF-Regular +liga +calt

# ─── Cursor ─────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0

# ─── Scrollback ─────────────────────────────────────────────────────────────
scrollback_lines      10000
scrollback_pager      less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ─── Mouse ──────────────────────────────────────────────────────────────────
mouse_hide_wait        3.0
copy_on_select         yes
strip_trailing_spaces  smart

# ─── Performance ────────────────────────────────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ─── Window ─────────────────────────────────────────────────────────────────
remember_window_size   yes
window_padding_width   8
hide_window_decorations no
confirm_os_window_close 0

# ─── Tabs ────────────────────────────────────────────────────────────────────
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       1
tab_title_template     "{index}: {title[:20]}"
active_tab_font_style  bold

# ─── Color Scheme (Tokyo Night) ─────────────────────────────────────────────
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #33467c

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# URL colors
url_color #7aa2f7
url_style curly

# ─── Keyboard Shortcuts ──────────────────────────────────────────────────────
# Tabs
map ctrl+t        new_tab_with_cwd
map ctrl+w        close_tab
map ctrl+shift+l  next_tab
map ctrl+shift+h  previous_tab
map ctrl+shift+r  set_tab_title

# Windows/Splits
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+w      close_window
map ctrl+shift+]      next_window
map ctrl+shift+[      previous_window

# Font size
map ctrl+equal    change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0

# Scrollback
map ctrl+shift+k  scroll_line_up
map ctrl+shift+j  scroll_line_down
map ctrl+shift+u  scroll_page_up
map ctrl+shift+d  scroll_page_down

# Copy/Paste
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard

# Reload config
map ctrl+shift+F5 load_config_file

# ─── SSH Kitten ──────────────────────────────────────────────────────────────
# Automatically forwards your terminfo over SSH so there are no rendering issues
map ctrl+shift+s  kitten ssh

# ─── Shell Integration ───────────────────────────────────────────────────────
shell_integration enabled


# ─── Transparency ────────────────────────────────────────────────────────────
background_opacity 0.6
dynamic_background_opacity yes

# ─── Cursor Animation ────────────────────────────────────────────────────────
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0


enable_audio_bell no
shell zellij
